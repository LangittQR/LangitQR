<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Langitt QR</title>

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="container">

  <div class="form-box">
    <h1>Langitt QR</h1>

    <input id="linkInput" placeholder="Masukkan link profile">
    <input id="nameInput" placeholder="Username">
    <input type="file" id="imageInput">

    <div class="button-group">
      <button onclick="generateQR()">Generate</button>
      <button onclick="downloadQR()">Download</button>
    </div>
  </div>

  <div class="card" id="card">

    <div class="qr-area">
      <div id="qr"></div>
    </div>

    <h2 id="displayName">username</h2>
    <p id="displayUser">@username</p>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
